name: Tests & Build

on:
  push:
    branches: [master, supercon-port]
  pull_request:
    branches: [master]

jobs:
  native-unit-tests:
    name: Native Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run native unit tests
        run: pio test -e native -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-test-results
          path: .pio/build/native/

  lvgl-simulator-tests:
    name: LVGL Simulator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run LVGL simulator tests
        run: pio test -e native_lvgl -v

      - name: Upload PPM screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lvgl-screenshots
          path: |
            *.ppm
            .pio/build/native_lvgl/

  factory-simulation-tests:
    name: Factory App Simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run factory simulation tests
        run: pio test -e native_factory -v

      - name: Upload factory screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: factory-screenshots
          path: |
            factory_*.ppm

  esp32-build-check:
    name: ESP32-S3 Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Compile for ESP32-S3 (no upload)
        run: pio run -e tlora_pager

      - name: Upload firmware artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/supercon-port')
        uses: actions/upload-artifact@v4
        with:
          name: tlora-pager-firmware
          path: |
            .pio/build/tlora_pager/firmware.bin
            .pio/build/tlora_pager/firmware.elf
            .pio/build/tlora_pager/partitions.bin
