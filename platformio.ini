; PlatformIO Project Configuration
; T-Lora-Pager-SkinnyCon (LilyGoLib)
;
; Native environments for CI testing, ESP32-S3 env for compilation check.

[platformio]
default_envs = native, native_lvgl, native_factory

; ============================================================
; Native unit tests (Unity) — no board, no framework
; Tests hardware logic, data structures, parsing
; ============================================================
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
    -DUNITY_INCLUDE_DOUBLE
    -DLVGL_SIMULATOR
    -DLV_CONF_INCLUDE_SIMPLE
    -Itest/mocks
    -Itest/simulator
test_filter = test_hardware*
; Exclude src/ from native builds (Arduino-specific code won't compile)
build_src_filter = -<*>

; ============================================================
; Native LVGL headless simulator tests (Unity + LVGL 9.2)
; Renders to 480x222 RGB565 framebuffer, exports PPM screenshots
; sim_main.c is #included directly in the test file
; ============================================================
[env:native_lvgl]
platform = native
test_framework = unity
build_flags =
    -std=c++17
    -DUNITY_INCLUDE_DOUBLE
    -DLVGL_SIMULATOR
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB
    -Itest/simulator
    -Itest/mocks
lib_deps =
    lvgl/lvgl@^9.2.0
test_filter = test_lvgl_*
; Exclude src/ from LVGL builds
build_src_filter = -<*>

; ============================================================
; Factory app simulation tests (Unity + LVGL 9.2 + real assets)
; Renders actual factory screens with real fonts and icons
; Heavier than native_lvgl — includes ~1MB of compiled assets
; ============================================================
[env:native_factory]
platform = native
test_framework = unity
build_flags =
    -std=c++17
    -DUNITY_INCLUDE_DOUBLE
    -DLVGL_SIMULATOR
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB
    -Itest/simulator
    -Itest/mocks
lib_deps =
    lvgl/lvgl@^9.2.0
test_filter = test_factory_*
; Exclude src/ from factory sim builds
build_src_filter = -<*>

; ============================================================
; ESP32-S3 compilation check (no upload)
; Uses custom board definition (boards/tlora_pager.json) with
; project-local variant (variants/tlora_pager/pins_arduino.h)
; ============================================================
[env:tlora_pager]
platform = espressif32@6.10.0
board = tlora_pager
framework = arduino
board_build.variants_dir = variants
board_build.variant = tlora_pager
board_build.partitions = application/SkinnyCon/partitions.csv
board_build.filesystem = fatfs
board_upload.flash_size = 16MB
upload_speed = 921600
monitor_speed = 115200
build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -DCORE_DEBUG_LEVEL=0
    -Isrc
    -Iapplication/SkinnyCon
    -Ilibraries/ESP8266Audio/src/libhelix-mp3
    -DARDUINO_LILYGO_LORA_SX1262
    ; RadioLib size reduction
    -DRADIOLIB_EXCLUDE_RF69
    -DRADIOLIB_EXCLUDE_SX1231
    -DRADIOLIB_EXCLUDE_RFM2X
    -DRADIOLIB_EXCLUDE_SX127X
    -DRADIOLIB_EXCLUDE_AFSK
    -DRADIOLIB_EXCLUDE_AX25
    -DRADIOLIB_EXCLUDE_HELLSCHREIBER
    -DRADIOLIB_EXCLUDE_MORSE
    -DRADIOLIB_EXCLUDE_RTTY
    -DRADIOLIB_EXCLUDE_SSTV
    -DRADIOLIB_EXCLUDE_DIRECT_RECEIVE
    -DRADIOLIB_EXCLUDE_APRS
    -DRADIOLIB_EXCLUDE_BELL
    -Wnarrowing
build_src_filter =
    +<*>
    +<../application/SkinnyCon/>
lib_extra_dirs = libraries
lib_ldf_mode = deep+
monitor_filters =
    default
    esp32_exception_decoder
lib_deps =
    Adafruit TCA8418
    Adafruit BusIO
    ESP32 BLE Keyboard Fork
    IRremoteESP8266
    ESP8266Audio
    NimBLE-Arduino
